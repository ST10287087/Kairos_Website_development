<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Alice&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Alice', serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    font-family: 'Alfa Slab One';
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-family: 'Montserrat';
    font-size: 14px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #6D0101;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #8B0000;
}

/* OTP INPUTS */
.otp-box {
    display: flex;
    justify-content: space-between;
    gap: 8px;
}

.otp-box input {
    text-align: center;
    font-size: 18px;
}

/* HIDE */
.hidden {
    display: none;
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: #007BFF;
    color: white;
    text-align: center;
    padding: 15px;
}

</style>
</head>

<body>

<div class="card">

    <!-- STEP 1 -->
    <div id="step1">
        <h1>Admin Login</h1>
        <p>Enter your phone number</p>
        <input type="text" placeholder="e.g. 0821234567" id="phone">
        <button onclick="sendCode()">Send Code</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="hidden">
        <h1>Verify Code</h1>
        <p>Enter the 5-digit code</p>

        <div class="otp-box">
            <input maxlength="1">
            <input maxlength="1">
            <input maxlength="1">
            <input maxlength="1">
            <input maxlength="1">
        </div>

        <button onclick="verifyCode()">Verify</button>
    </div>

</div>

<div class="footer">© Kairos Language Institute</div>

<script>

/* SIMULATED FLOW (FRONTEND ONLY) */
function sendCode() {
    const phone = document.getElementById("phone").value;

    if (phone.length < 10) {
        alert("Enter a valid phone number");
        return;
    }

    // Backend will replace this
    console.log("Send OTP to:", phone);

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
}

function verifyCode() {
    let inputs = document.querySelectorAll(".otp-box input");
    let code = "";

    inputs.forEach(input => code += input.value);

    if (code.length !== 5) {
        alert("Enter full code");
        return;
    }

    // Backend will verify this
    console.log("Entered OTP:", code);

    alert("Login successful (connect backend here)");
}

/* AUTO MOVE OTP */
document.querySelectorAll(".otp-box input").forEach((input, index, inputs) => {
    input.addEventListener("input", () => {
        if (input.value && inputs[index + 1]) {
            inputs[index + 1].focus();
        }
    });
});

</script>

</body>
</html>
